<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Registro Accesible</title>
</head>
<body>
<h1><b>Registro de Usuario</b></h1>

<form action="#" method="post">
    <fieldset>
        <legend><b>Información Personal</b></legend>

        <label for="nombre">Nombre completo:</label>
        <input type="text" id="nombre" name="nombre" required aria-required="true"><br><br>

        <label for="email">Correo electrónico:</label>
        <input type="email" id="email" name="email" required aria-required="true"><br><br>

        <label for="password">Contraseña:</label>
        <input type="password" id="password" name="password" required aria-required="true"><br><br>

        <label for="edad">Edad:</label>
        <input type="number" id="edad" name="edad" min="0"><br><br>

        <label for="genero">Género:</label>
        <select id="genero" name="genero">
            <option value="">Selecciona</option>
            <option value="femenino">Femenino</option>
            <option value="masculino">Masculino</option>
            <option value="otro">Otro</option>
        </select><br><br>

        <label for="terminos">
            <input type="checkbox" id="terminos" name="terminos" required aria-required="true">
            Acepto los términos y condiciones
        </label><br><br>

        <button type="submit">Registrarse</button>
    </fieldset>
</form>
</body>
</html>
