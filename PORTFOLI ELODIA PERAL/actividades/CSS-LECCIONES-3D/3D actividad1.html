<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imagen 3D Hover</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #ffe6f0;
            perspective: 1000px;
        }

        .imagen-3d {
            width: 300px;
            height: 200px;
            border-radius: 15px;
            overflow: hidden;
            transition: transform 0.5s;
            transform-style: preserve-3d;
        }

        .imagen-3d img {
            width: 100%;
            height: 100%;
            display: block;
        }

        .imagen-3d:hover {
            transform: rotateY(20deg) rotateX(10deg) scale(1.05);
        }
    </style>
</head>
<body>

<div class="imagen-3d">
    <img src="gato.png" alt="Imagen 3D">
</div>

</body>
</html>
