<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Chat entre dos personas</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            margin: 20px;
        }
        .chat {
            max-width: 600px;
            margin: auto;
            background-color: #fff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .mensaje {
            display: flex;
            align-items: flex-start;
            margin-bottom: 15px;
        }
        .avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            overflow: hidden;
            margin-right: 15px;
        }
        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .contenido {
            background-color: #e1f5fe;
            padding: 10px 15px;
            border-radius: 10px;
            position: relative;
            max-width: 80%;
        }
        .contenido h4 {
            margin: 0 0 5px 0;
            font-size: 1em;
            color: #0277bd;
        }
        .contenido span {
            font-size: 0.8em;
            color: #555;
        }
        .contenido p {
            margin: 0;
            font-size: 1em;
            color: #000;
        }
        .mensaje.alternativo .contenido {
            background-color: #c8e6c9;
            align-self: flex-end;
        }
    </style>
</head>
<body>
<div class="chat">
    <section class="mensaje">
        <div class="avatar">
            <img src="src/imagenes/avatar1.png" alt="Avatar Persona 1">
        </div>
        <div class="contenido">
            <h4>Ana <span>10:05 AM</span></h4>
            <p>Hola, ¿cómo estás?</p>
        </div>
    </section>

    <section class="mensaje alternativo">
        <div class="avatar">
            <img src="src/imagenes/avatar2.png" alt="Avatar Persona 2">
        </div>
        <div class="contenido">
            <h4>Carlos <span>10:06 AM</span></h4>
            <p>¡Hola Ana! Todo bien, ¿y tú?</p>
        </div>
    </section>

    <section class="mensaje">
        <div class="avatar">
            <img src="src/imagenes/avatar1.png" alt="Avatar Persona 1">
        </div>
        <div class="contenido">
            <h4>Ana <span>10:07 AM</span></h4>
            <p>Perfecto, gracias. ¿Listo para la reunión?</p>
        </div>
    </section>
</div>
</body>
</html>
