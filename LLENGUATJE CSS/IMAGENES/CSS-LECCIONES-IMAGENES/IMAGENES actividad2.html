<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Tarjeta de Contacto</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            height: 100%;
            font-family: Arial, sans-serif;
        }
        main {
            height: 100vh;
            background-image: url("src/imagenes/perro.png");
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        section {
            background-color: rgba(255,255,255,0.8);
            padding: 30px 50px;
            border-radius: 15px;
            text-align: center;
        }
        h1 {
            margin-bottom: 20px;
            font-size: 2.5em;
            color: #333;
        }
        nav ul {
            list-style: none;
        }
        nav ul li {
            margin: 10px 0;
        }
        nav ul li a {
            text-decoration: none;
            font-size: 1.2em;
            color: #2c3e50;
            transition: color 0.3s;
        }
        nav ul li a:hover {
            color: #e74c3c;
        }
    </style>
</head>
<body>
<main>
    <section>
        <h1>Elodia Peral</h1>
        <nav>
            <ul>
                <li><a href="#">Curriculum Vitae</a></li>
                <li><a href="#">LinkedIn</a></li>
                <li><a href="#">Instagram</a></li>
                <li><a href="#">Email</a></li>
                <li><a href="#">Mi Portfolio</a></li>
            </ul>
        </nav>
    </section>
</main>
</body>
</html>
