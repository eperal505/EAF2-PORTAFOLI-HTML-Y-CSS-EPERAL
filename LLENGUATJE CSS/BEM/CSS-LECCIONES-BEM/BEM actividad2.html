<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sistema de Comentarios</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f9f9f9;
            margin: 20px;
        }
        .comentario-form {
            margin-bottom: 20px;
        }
        .comentario-form input,
        .comentario-form textarea {
            width: 100%;
            padding: 8px;
            margin-bottom: 10px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }
        .comentario-form button {
            padding: 8px 15px;
            background-color: #4a90e2;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .comentario-form button:hover {
            background-color: #357ab8;
        }
        .comentarios {
            border-top: 2px solid #ccc;
            padding-top: 10px;
        }
        .comentario {
            background-color: #fff;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 5px;
            box-shadow: 1px 1px 3px rgba(0,0,0,0.1);
        }
        .comentario h4 {
            margin: 0 0 5px 0;
        }
    </style>
</head>
<body>
<h1>Sistema de Comentarios</h1>
<div class="comentario-form">
    <input type="text" placeholder="Tu nombre">
    <textarea rows="4" placeholder="Escribe tu comentario"></textarea>
    <button>Enviar</button>
</div>

<div class="comentarios">
    <div class="comentario">
        <h4>Ana</h4>
        <p>¡Me encanta este artículo!</p>
    </div>
    <div class="comentario">
        <h4>Carlos</h4>
        <p>Muy interesante, gracias por compartir.</p>
    </div>
</div>
</body>
</html>
