<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Header con Navegación y Búsqueda</title>
    <style>
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            background-color: #f2f2f2;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        nav a {
            margin: 0 10px;
            text-decoration: none;
            color: #333;
            font-weight: bold;
        }
        nav a:hover {
            color: #4a90e2;
        }
        form input[type="text"] {
            padding: 5px;
            border-radius: 4px;
            border: 1px solid #ccc;
        }
        form button {
            padding: 5px 10px;
            border: none;
            background-color: #4a90e2;
            color: white;
            border-radius: 4px;
            cursor: pointer;
        }
        form button:hover {
            background-color: #357ab8;
        }
        .logo {
            font-weight: bold;
            font-size: 1.5em;
            color: #4a90e2;
        }
    </style>
</head>
<body>
<header>
    <div class="logo">MiLogo</div>
    <nav>
        <a href="#inicio">Inicio</a>
        <a href="#servicios">Servicios</a>
        <a href="#contacto">Contacto</a>
        <a href="#sobre">Sobre nosotros</a>
    </nav>
    <form action="#" method="get">
        <input type="text" placeholder="Buscar...">
        <button type="submit">Buscar</button>
    </form>
</header>
</body>
</html>
