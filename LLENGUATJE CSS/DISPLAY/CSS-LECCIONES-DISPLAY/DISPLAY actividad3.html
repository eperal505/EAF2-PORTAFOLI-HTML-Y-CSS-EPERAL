<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Menú Horizontal Rosa</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        header {
            background-color: #f06292; /* rosa de fondo del header */
            padding: 10px 0;
        }
        nav ul {
            list-style: none;
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 0;
            padding: 0;
        }
        nav ul li a {
            text-decoration: none;
            color: white;
            padding: 8px 16px;
            background-color: #ec407a; /* rosa más intenso para botones */
            border-radius: 5px;
            transition: background-color 0.3s;
        }
        nav ul li a:hover {
            background-color: #f48fb1; /* rosa claro al pasar el cursor */
        }
    </style>
</head>
<body>
<header>
    <nav>
        <ul>
            <li><a href="#">Inicio</a></li>
            <li><a href="#">Servicios</a></li>
            <li><a href="#">Portafolio</a></li>
            <li><a href="#">Contacto</a></li>
        </ul>
    </nav>
</header>
</body>
</html>
