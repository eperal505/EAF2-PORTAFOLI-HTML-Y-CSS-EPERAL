<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Párrafo con strong estilizado y subrayado alargado</title>
    <style>
        .resaltado {
            background-color: rgba(255, 255, 0, 0.5);
            text-decoration: underline;
            padding: 0 10px; /* aumenta el padding para alargar el subrayado */
            border-radius: 2px;
        }
        p {
            font-family: Arial, sans-serif;
            font-size: 1.2em;
            line-height: 1.6;
        }
    </style>
</head>
<body>
<p>
    Este es un párrafo de ejemplo donde algunas palabras están <strong class="resaltado">resaltadas</strong> para mostrar cómo aplicar un efecto de subrayado con fondo amarillo semitransparente. Otro ejemplo es la palabra <strong class="resaltado">importante</strong> que también usa el mismo estilo.
</p>
</body>
</html>
